# Render Blueprint — deploys the RapidTriage API.
# Push this repo to GitHub, then in Render: New → Blueprint → pick this repo.
#
# DATABASE_URL is `sync: false`: it is set on the service directly and never
# committed, since it contains a password. It currently points at the Render
# Postgres `rapidtriage-db` (dpg-d9fjecfavr4c73ccoa2g-a) via its internal
# connection string, which keeps traffic inside the Oregon region.
#
# HEADS UP — that database is on the free plan and Render deletes free
# Postgres 30 days after creation, on 2026-08-20. When it goes, DNS for the
# host disappears and the API can no longer reach it. This exact expiry (on a
# previous database) is what caused the outage on 2026-07-19.
#
# The API no longer dies when that happens: it serves /health and reports the
# fault on /ready instead of exiting 1 in a restart loop. To avoid the
# interruption entirely, move DATABASE_URL to a Postgres without an expiry
# (a paid Render plan, or an external provider such as Neon) before that date.
# Nothing in the code needs to change — only the variable.
services:
  - type: web
    name: rapidtriage-api
    runtime: node
    plan: free
    # Liveness only. The API answers /health even while the database is down,
    # so a database outage degrades the service instead of restart-looping it.
    # Readiness is /ready, which reports 503 until migrations succeed.
    healthCheckPath: /health
    buildCommand: npm ci && npm run build:shared && npm --workspace @rapidtriage/api run build
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_VERSION
        value: "20"
